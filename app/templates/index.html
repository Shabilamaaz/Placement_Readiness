<!DOCTYPE html>
<html>
<head>
    <title>Placement Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Placement Prediction System</h2>

    <form action="/predict" method="post">
        <input type="number" name="semester" placeholder="Semester" required><br><br>
        <input type="number" step="0.1" name="cgpa" placeholder="CGPA" required><br><br>
        <input type="number" name="attendance" placeholder="Attendance" required><br><br>
        <input type="number" name="aptitude" placeholder="Aptitude Score" required><br><br>
        <input type="number" name="coding" placeholder="Coding Score" required><br><br>
        <input type="number" name="communication" placeholder="Communication Score" required><br><br>
        <input type="number" name="projects" placeholder="Projects Count" required><br><br>
        <input type="number" name="internships" placeholder="Internships (0/1)" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <!-- RESULT -->
    {% if prediction_text %}
    <div class="result {% if 'Placed' in prediction_text %}success{% else %}fail{% endif %}">
        {{ prediction_text }}
    </div>

    <!-- PLACEMENT CHANCE -->
    <p><b>Placement Chance:</b> {{ chance }}%</p>

    <!-- GRAPH -->
    <div style="margin-top:20px;">
        <img src="{{ url_for('static', filename='images/graph.png') }}" width="400">
    </div>
    {% endif %}

    <!-- SUGGESTION -->
    {% if suggestion %}
    <p class="suggestion">{{ suggestion }}</p>
    {% endif %}

</body>
</html>
