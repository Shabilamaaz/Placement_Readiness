<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Placement Readiness{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="bg-orbit" aria-hidden="true">
        <div class="bg-orbit__layer bg-orbit__layer--a"></div>
        <div class="bg-orbit__layer bg-orbit__layer--b"></div>
        <div class="bg-orbit__layer bg-orbit__layer--c"></div>
        <div class="bg-orbit__sparkles"></div>
        <div class="bg-orbit__grain"></div>
    </div>

    <header class="topbar">
        <div class="topbar__inner">
            <a class="brand" href="{{ url_for('dashboard') if username else url_for('login') }}">
                <span class="brand__text">Placement Readiness</span>
            </a>

            {% if username %}
            <nav class="topnav" aria-label="Primary">
                <a class="topnav__link {% if request.endpoint == 'dashboard' %}is-active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="topnav__link {% if request.endpoint == 'home' %}is-active{% endif %}" href="{{ url_for('home') }}">Career Toolkit</a>
                <a class="topnav__link {% if request.endpoint == 'resume_analyzer' %}is-active{% endif %}" href="{{ url_for('resume_analyzer') }}">Resume Analyzer</a>
                <a class="topnav__link {% if request.endpoint == 'profile' %}is-active{% endif %}" href="{{ url_for('profile') }}">Profile</a>
                <a class="topnav__link {% if request.endpoint == 'companies' %}is-active{% endif %}" href="{{ url_for('companies') }}">Companies</a>
                <a class="topnav__link {% if request.endpoint == 'leaderboard' %}is-active{% endif %}" href="{{ url_for('leaderboard') }}">Leaderboard</a>
                <a class="topnav__link {% if request.endpoint == 'admin' %}is-active{% endif %}" href="{{ url_for('admin') }}">Admin</a>
                <a class="topnav__link" href="{{ url_for('logout') }}">Logout</a>
            </nav>
            {% endif %}

            <div class="topbar__actions">
                {% if username %}
                <div class="user-chip" title="Signed in user">
                    <span class="user-chip__dot" aria-hidden="true"></span>
                    <span class="user-chip__text">{{ username }}</span>
                </div>
                {% endif %}

                <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-toggle__icon" aria-hidden="true">
                        <svg class="theme-toggle__sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Zm0-16a1 1 0 0 1 1 1v1.2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm0 18.8a1 1 0 0 1 1 1V23a1 1 0 1 1-2 0v-1.2a1 1 0 0 1 1-1ZM4.22 5.64a1 1 0 0 1 1.41 0l.85.85A1 1 0 1 1 5.07 7.9l-.85-.85a1 1 0 0 1 0-1.41ZM17.52 18.94a1 1 0 0 1 1.41 0l.85.85a1 1 0 0 1-1.41 1.41l-.85-.85a1 1 0 0 1 0-1.41ZM2 13a1 1 0 1 1 0-2h1.2a1 1 0 1 1 0 2H2Zm18.8 0a1 1 0 1 1 0-2H23a1 1 0 1 1 0 2h-2.2ZM4.22 20.36a1 1 0 0 1 0-1.41l.85-.85A1 1 0 1 1 6.48 19.5l-.85.85a1 1 0 0 1-1.41 0ZM17.52 7.06a1 1 0 0 1 0-1.41l.85-.85a1 1 0 1 1 1.41 1.41l-.85.85a1 1 0 0 1-1.41 0Z"></path>
                        </svg>
                        <svg class="theme-toggle__moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M21 14.2A8.2 8.2 0 0 1 9.8 3a7.2 7.2 0 1 0 11.2 11.2Z"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </div>
    </header>

    <main class="app-shell">
        {% block body %}{% endblock %}
    </main>

    <script>
        (function () {
            const root = document.documentElement;
            const btn = document.getElementById("theme-toggle");
            const key = "pr_theme";

            function setTheme(theme) {
                root.setAttribute("data-theme", theme);
                btn && btn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
            }

            const saved = localStorage.getItem(key);
            const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            setTheme(saved || (prefersDark ? "dark" : "light"));

            btn && btn.addEventListener("click", function () {
                const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
                const next = current === "dark" ? "light" : "dark";
                localStorage.setItem(key, next);
                setTheme(next);
            });
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
