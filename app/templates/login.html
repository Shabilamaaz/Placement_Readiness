<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="layout-wrap center-box">
        <div class="page-card auth-card">
            <h2>Login</h2>
            <p class="muted-text">Welcome back! Login to continue your placement preparation.</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="flash-msg">{{ message }}</p>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('login') }}">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-primary full-width-btn">Login</button>
            </form>
            <p class="auth-link"><a href="{{ url_for('forgot_password') }}">Forgot Password?</a></p>

            <p class="auth-link">Don't have an account? <a href="{{ url_for('signup') }}">Signup</a></p>
        </div>
    </div>
</body>
</html>
